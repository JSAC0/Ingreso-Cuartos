<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro Cuartos de Equipos CACOM-1</title>



<style>

#tsparticles{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

z-index:-1;

background:#0f172a;

}

input[list]{

appearance:none;
-webkit-appearance:none;

}

form{
display:block;
}

label{
display:block;
font-weight:600;
margin-top:12px;
margin-bottom:6px;
}

input, select, textarea{

width:100%;
padding:14px;

border-radius:10px;
border:1px solid #d1d5db;

font-size:15px;

margin-bottom:18px;

box-sizing:border-box;

background:white;

}



/* Fondo tecnológico */

body{

    
margin:0;
font-family: Arial, Helvetica, sans-serif;

background-image:
linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
url("https://images.unsplash.com/photo-1558494949-ef010cbdcc31");

background-size:cover;
background-position:center;
background-attachment:fixed;

min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

}



.container{

background:rgba(255,255,255,0.92);

padding:35px;

border-radius:16px;

width:90%;
max-width:420px;

box-shadow:
0 25px 60px rgba(0,0,0,0.6),
0 0 25px rgba(56,189,248,0.25);

backdrop-filter:blur(10px);

border:1px solid rgba(56,189,248,0.3);

transition:0.3s;

}

.container:hover{

transform:translateY(-3px);

box-shadow:
0 35px 80px rgba(0,0,0,0.7),
0 0 35px rgba(56,189,248,0.45);

}



h1{

text-align:center;

margin-bottom:5px;

font-size:22px;

color:#0f172a;

letter-spacing:0.5px;

}

.subtitle{

text-align:center;

font-size:14px;

color:#475569;

margin-bottom:25px;

letter-spacing:0.5px;

}

label{

font-weight:bold;
font-size:14px;

}

select,textarea{

width:100%;
padding:12px;
margin-top:6px;
margin-bottom:18px;

border-radius:6px;
border:1px solid #ccc;

font-size:14px;

}

button{

width:100%;
padding:14px;

background:linear-gradient(135deg,#2563eb,#1d4ed8);

color:white;

border:none;

border-radius:10px;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:0.25s;

box-shadow:0 6px 18px rgba(37,99,235,0.4);

}

button:hover{

transform:scale(1.02);

box-shadow:0 10px 25px rgba(37,99,235,0.6);

}

.footer{

margin-top:15px;
font-size:12px;
text-align:center;
color:gray;

}

.clock{

font-size:14px;
font-weight:bold;
color:#2563eb;
margin-bottom:20px;

}

.mensaje{

display:none;

margin-top:20px;

padding:16px;

background:linear-gradient(135deg,#16a34a,#22c55e);

color:white;

border-radius:10px;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,0.4);

animation: aparecer 0.4s ease;

}

.mensajeIcono{

font-size:28px;

margin-bottom:5px;

}

.mensajeTexto{

font-weight:bold;

font-size:15px;

}

.mensajeTexto span{

font-size:12px;

font-weight:normal;

opacity:0.9;

}

@keyframes aparecer{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>
<div id="tsparticles"></div>
<div class="container">
<img src="LOGO.png" class="logo">

<h1>Registro de Ingreso</h1>

<div class="clock" id="clock">
Cargando hora...
</div>

<div class="subtitle">
Cuartos de Equipos CACOM-1
</div>

<form id="registroForm">

<label>Nombre</label>

<input 
type="text" 
id="nombre"
name="nombre"
list="listaNombres"
placeholder="Escriba su nombre o selecciónelo del listado"
required
>

<datalist id="listaNombres">

<option value="CT Tabares Zapata Verónica">
<option value="ST Agressoth Cardona Jassir">
<option value="ST Cruz Reinoso Juan">
<option value="T1 Paipilla Rodriguez German">
<option value="T1 Vidal Jhonier Alexander">
<option value="T4 Romero Berón Oscar">
<option value="AT Cala Guerrero Cristian">  
<option value="TS18 Fredy Hernandez">

</datalist>

<label>Cuarto de equipo</label>

<select id="cuarto" name="cuarto" required>

<option value="" disabled selected>
Seleccione el cuarto al que ingresa
</option>

<option>ACCOFA</option>
<option>INGENIERÍA</option>
<option>ESM</option>
<option>RADIOAYUDAS</option>
<option>TANQUES Y PERCHAS</option>
<option>GRUCO</option>

</select>

<label>Actividad</label>

<select id="actividad" name="actividad" required>

<option value="" disabled selected>
Seleccione la actividad que realizará
</option>

<option>Revista</option>
<option>Acompañamiento</option>
<option>Mantenimiento</option>
<option>Otros</option>

</select>

<label>Observaciones</label>

<textarea id="observaciones" placeholder="Escriba aquí alguna novedad relevante (opcional)"></textarea>

<button type="submit">

Registrar ingreso

</button>

<div id="mensajeConfirmacion" class="mensaje">

<div class="mensajeIcono">✔</div>

<div class="mensajeTexto">
REGISTRO EXITOSO<br>
<span>Ingreso almacenado en el sistema</span>
</div>

</div>

</form>

<div class="footer">

Sistema de registro CACOM-1

</div>

</div>

<script>

document.getElementById("registroForm").addEventListener("submit", function(e){

e.preventDefault();

var datos = {

nombre:document.getElementById("nombre").value,
cuarto:document.getElementById("cuarto").value,
actividad:document.getElementById("actividad").value,
observaciones:document.getElementById("observaciones").value

};

fetch("https://script.google.com/macros/s/AKfycbzhZys3K9JjtMDH7pRozzXHWHv000CV_FKaGPs86Yvc155LL1tBb0owR2PTQ7d5INZjgQ/exec",{

method:"POST",
body:JSON.stringify(datos)

})
.then(res => {

document.getElementById("mensajeConfirmacion").style.display="block";

document.getElementById("sonidoConfirmacion").play();

document.getElementById("registroForm").reset();

setTimeout(function(){

document.getElementById("mensajeConfirmacion").style.display="none";

},4000);

})
.catch(err=>{

alert("Error al registrar");

});

});

function actualizarReloj(){

var ahora = new Date();

var fecha = ahora.toLocaleDateString("es-CO");
var hora = ahora.toLocaleTimeString("es-CO");

document.getElementById("clock").innerHTML =
"Fecha y hora actual: " + fecha + " - " + hora;

}

setInterval(actualizarReloj,1000);

actualizarReloj();

</script>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>

tsParticles.load("tsparticles", {

background: {
color: "#0f172a"
},

fpsLimit: 60,

particles: {

number: {
value: 60
},

color: {
value: "#38bdf8"
},

links: {
enable: true,
distance: 150,
color: "#38bdf8",
opacity: 0.4,
width: 1
},

move: {
enable: true,
speed: 1
},

size: {
value: 3
},

opacity: {
value: 0.5
}

},

interactivity: {

events: {
onHover: {
enable: true,
mode: "grab"
}
},

modes: {

grab: {
distance: 200,
links: {
opacity: 0.7
}
}

}

}

});

</script>

<audio id="sonidoConfirmacion">

<source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3">

</audio>

</body>
</html>
