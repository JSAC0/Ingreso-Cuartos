<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro Cuartos de Equipos CACOM-1</title>

<style>

input[list]{

appearance:none;
-webkit-appearance:none;

}

form{
display:block;
}

label{
display:block;
font-weight:600;
margin-top:12px;
margin-bottom:6px;
}

input, select, textarea{

width:100%;
padding:14px;

border-radius:10px;
border:1px solid #d1d5db;

font-size:15px;

margin-bottom:18px;

box-sizing:border-box;

background:white;

}


body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* Fondo tecnológico */

body::before{

content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(circle at 20% 30%, rgba(56,189,248,0.15) 2px, transparent 2px),
radial-gradient(circle at 80% 70%, rgba(56,189,248,0.15) 2px, transparent 2px),
radial-gradient(circle at 50% 50%, rgba(59,130,246,0.15) 2px, transparent 2px);

background-size:120px 120px;
z-index:-1;

}

.container{

background:white;
padding:35px;
border-radius:12px;
width:90%;
max-width:420px;

box-shadow:0 20px 40px rgba(0,0,0,0.4);

}

h1{

text-align:center;
margin-bottom:5px;
font-size:22px;

}

.subtitle{

text-align:center;
font-size:14px;
color:gray;
margin-bottom:25px;

}

label{

font-weight:bold;
font-size:14px;

}

select,textarea{

width:100%;
padding:12px;
margin-top:6px;
margin-bottom:18px;

border-radius:6px;
border:1px solid #ccc;

font-size:14px;

}

button{

width:100%;
padding:14px;

background:#2563eb;
color:white;

border:none;
border-radius:8px;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:0.2s;

}

button:hover{

background:#1d4ed8;

}

.footer{

margin-top:15px;
font-size:12px;
text-align:center;
color:gray;

}

.clock{

font-size:14px;
font-weight:bold;
color:#2563eb;
margin-bottom:20px;

}

</style>

</head>

<body>

<div class="container">
<img src="LOGO.png" class="logo">

<h1>Registro de Ingreso</h1>

<div class="clock" id="clock">
Cargando hora...
</div>

<div class="subtitle">
Cuartos de Equipos CACOM-1
</div>

<form id="registroForm">

<label>Nombre</label>

<input 
type="text" 
name="nombre" 
list="listaNombres"
placeholder="Escriba su nombre o selecciónelo del listado"
required
>

<datalist id="listaNombres">

<option value="CT Tabares Zapata Verónica">
<option value="ST Agressoth Cardona Jassir">
<option value="ST Cruz Reinoso Juan">
<option value="T1 Paipilla Rodriguez German">
<option value="T1 Vidal Jhonier Alexander">
<option value="T4 Romero Berón Oscar">
<option value="AT Cala Guerrero Cristian">  
<option value="TS18 Fredy Hernandez">

</datalist>

<label>Cuarto de equipo</label>

<select id="cuarto" required>

<option value="" disabled selected>
Seleccione el cuarto al que ingresa
</option>

<option>ACCOFA</option>
<option>INGENIERÍA</option>
<option>ESM</option>
<option>RADIOAYUDAS</option>
<option>TANQUES Y PERCHAS</option>
<option>GRUCO</option>

</select>

<label>Actividad</label>

<select id="actividad" required>

<option value="" disabled selected>
Seleccione la actividad que realizará
</option>

<option>Revista</option>
<option>Acompañamiento</option>
<option>Mantenimiento</option>
<option>Otros</option>

</select>

<label>Observaciones</label>

<textarea id="observaciones" placeholder="Escriba aquí alguna novedad relevante (opcional)"></textarea>

<button type="submit">

Registrar ingreso

</button>

</form>

<div class="footer">

Sistema de registro CACOM-1

</div>

</div>

<script>

document.getElementById("registroForm").addEventListener("submit", function(e){

e.preventDefault();

var datos = {

nombre:document.getElementById("nombre").value,
cuarto:document.getElementById("cuarto").value,
actividad:document.getElementById("actividad").value,
observaciones:document.getElementById("observaciones").value

};

fetch("https://script.google.com/macros/s/AKfycbzhZys3K9JjtMDH7pRozzXHWHv000CV_FKaGPs86Yvc155LL1tBb0owR2PTQ7d5INZjgQ/exec",{

method:"POST",
body:JSON.stringify(datos)

})
.then(res=>{

alert("Ingreso registrado correctamente");

document.getElementById("registroForm").reset();

})
.catch(err=>{

alert("Error al registrar");

});

});

function actualizarReloj(){

var ahora = new Date();

var fecha = ahora.toLocaleDateString("es-CO");
var hora = ahora.toLocaleTimeString("es-CO");

document.getElementById("clock").innerHTML =
"Fecha y hora actual: " + fecha + " - " + hora;

}

setInterval(actualizarReloj,1000);

actualizarReloj();

</script>


</body>
</html>
